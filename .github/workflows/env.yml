name: Render environment

# Public orchestrator for the environment / asset preview.
#
# Runs from THIS public repo so it uses free CI minutes (the private content repo
# is out of minutes). It checks out the private content repo with a token, then
# hands everything to `ci.py env`, which fetches the CC0/MIT asset packs, stages
# them, renders one composition, and uploads the mp4 to Drive. Exactly like the
# episode pipeline it runs quiet (CI_QUIET=1) and masks the Drive remote, so
# nothing sensitive appears in the public logs and there is no public artifact.

on:
  workflow_dispatch:
    inputs:
      composition:
        description: "Composition id to render"
        required: true
        default: "KenneyRoom"

concurrency:
  group: env-${{ github.event.inputs.composition }}
  cancel-in-progress: false

env:
  CI_QUIET: "1"

jobs:
  env:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Remotion browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: ${{ runner.os }}-remotion-browser

      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch assets, render environment, upload to Drive (quiet)
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_REMOTE: ${{ secrets.RCLONE_REMOTE }}
          VIDEO_DRIVE_SUBDIR: ${{ secrets.VIDEO_DRIVE_SUBDIR }}
        run: python ci.py env "${{ github.event.inputs.composition }}"
